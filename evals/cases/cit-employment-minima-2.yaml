id: cit-employment-minima-2
type: citation
description: >
  Employment Contract vs Statutory Minima — Holiday Entitlement column: excerpt
  comparing contractual holiday against the reg 13/13A Working Time Regulations 1998
  (SI 1998/1833) floor.
input:
  text: >
    Holiday entitlement of 20 days plus bank holidays satisfies the 5.6-week minimum
    required by reg 13 and reg 13A of the Working Time Regulations 1998
    (SI 1998/1833).
