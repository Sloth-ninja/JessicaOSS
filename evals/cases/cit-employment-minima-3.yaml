  Employment Contract vs Statutory Minima — Written Particulars and Pension
  Auto-Enrolment columns: excerpt citing s.1 Employment Rights Act 1996 and the
  Pensions Act 2008 bare-Act reference.
input:
  text: >
    The written statement required by s.1 Employment Rights Act 1996 is missing the
    required particulars of pension arrangements, notwithstanding the employer's
    auto-enrolment obligations under the Pensions Act 2008.
