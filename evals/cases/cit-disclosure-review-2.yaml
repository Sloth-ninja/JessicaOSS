id: cit-disclosure-review-2
type: citation
description: >
  Disclosure Review: excerpt noting the Disclosure Review Document procedure under
  PD 57AD in the Business and Property Courts, citing the Civil Procedure Rules 1998
  (SI 1998/3132).
input:
  text: >
    Where the claim is allocated to a Business and Property Court, the Disclosure
    Review Document procedure under PD 57AD (itself made under the Civil Procedure
    Rules 1998 (SI 1998/3132)) may apply instead of standard disclosure.
