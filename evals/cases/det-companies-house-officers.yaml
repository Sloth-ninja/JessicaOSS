id: det-companies-house-officers
type: deterministic
description: >
  Companies House officers lookup for ARIA GRACE LAW CIC (company number
  13927967) — the pilot firm. Confirms Lindsay Paul Healy is listed as a
  director, appointed 21/02/2022, verified against the live API on
  08/07/2026. Auth is HTTP Basic with the API key as username (handled by
  the runner via auth: companies_house; skipped when
  COMPANIES_HOUSE_API_KEY is unset).
request:
  url: https://api.company-information.service.gov.uk/company/13927967/officers
  auth: companies_house
  status: 200
  contains:
    - "HEALY, Lindsay Paul"
    - "director"
    - "2022-02-21"
