id: cit-employment-minima-1
type: citation
description: >
  Employment Contract vs Statutory Minima — Notice Period column: excerpt comparing
  contractual notice against the s.86 Employment Rights Act 1996 floor.
input:
  text: >
    The contract provides for four weeks' notice on either side; the statutory
    minimum under s.86 Employment Rights Act 1996 for this length of service is only
    two weeks, so the contractual term exceeds the floor.
